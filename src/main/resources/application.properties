spring.application.name=EnterpriseApplicationDevelopment

# ==========================================
# ShopWave Starter – Application Properties
# ==========================================

# Server port (required by C1)
server.port=8080

# Custom app name property (required by C1)
app.name=ShopWave

# ==========================================
# H2 Database Configuration
# ==========================================

# The JDBC URL for H2 in-memory database.
# "shopwavedb" is just the name of our in-memory DB.
spring.datasource.url=jdbc:h2:mem:shopwavedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE

# H2 driver class
spring.datasource.driver-class-name=org.h2.Driver

# H2 default credentials
spring.datasource.username=sa
spring.datasource.password=

# ==========================================
# JPA / Hibernate Configuration
# ==========================================

# "create-drop" means: create schema on startup, drop it on shutdown.
# Good for development. For production you'd use "validate" or "none".
spring.jpa.hibernate.ddl-auto=create-drop

# Show SQL in console — very useful for learning/debugging
spring.jpa.show-sql=true

# Pretty-print the SQL
spring.jpa.properties.hibernate.format_sql=true

# Tell Spring which database dialect to use
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ==========================================
# H2 Console (optional but handy for testing)
# ==========================================

# Enable the web-based H2 console at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==========================================
# Actuator Configuration
# ==========================================

# Expose all actuator endpoints (health, info, metrics, etc.)
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
